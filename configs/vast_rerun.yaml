# From-scratch retrain config for Vast.ai, post-data-pipeline-upgrade.
#
# Round 2 (after $10 top-up):
#   * train.epochs 120 → 500            (v2 stopped improving at ~60; chase the long tail)
#   * train.save_every_n_epochs 5 → 3   (crash safety on a re-rentable box)
#   * train.early_stop_patience 20 → 40 (don't quit too early on a long run)
#   * lr unchanged: cosine 5e-5 → 1e-6 over the full 500-epoch span
#
# Expected time on 1× RTX PRO 6000 ($1.08/h): ~7.5 hours = ~$8.

seed: 42
device: cuda

data:
  h5_path: /workspace/data/vot_fmo_v2.h5    # rebuilt with the augmentation pipeline
  val_fraction: 0.04
  num_workers: 8
  pin_memory: true

model:
  in_channels: 6
  base_channels: [16, 64, 128, 256, 256]
  use_cbam: true
  predict_matting: true
  predict_uncertainty: true

loss:
  matting_weight: 0.2          # ↓ from 0.5 — let TDF head dominate
  boundary_weight: 0.3         # ↑ from 0.1 — sharper trajectory edges

train:
  epochs: 500
  batch_size: 64
  grad_accum_steps: 1
  lr: 5.0e-5                   # cosine decay over the full 500-epoch span
  weight_decay: 1.0e-5
  amp: false
  channels_last: true
  grad_clip_norm: 1.0
  log_every_n_steps: 50
  val_every_n_epochs: 1
  save_every_n_epochs: 3       # crash safety — leaves recent ckpt if box dies
  early_stop_patience: 40      # longer patience for the long run

logging:
  mlflow_uri: file:/workspace/experiments/mlruns
  mlflow_experiment: fmodetect-v2-rerun-500ep
  use_clearml: false
  clearml_project: fmodetect-v2
  tensorboard_dir: /workspace/experiments/tb

checkpoints:
  dir: /workspace/experiments/checkpoints
  keep_best_n: 5
