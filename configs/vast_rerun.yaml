# From-scratch retrain config for Vast.ai, post-data-pipeline-upgrade.
#
# Key differences vs configs/vast.yaml:
#   * loss.matting_weight 0.5 → 0.2  (matting head learned too fast in colab run; let TDF lead)
#   * loss.boundary_weight 0.1 → 0.3 (sharper trajectory edges)
#   * train.epochs 45 → 120         (paper trains ~3 days; we need more gradient steps)
#   * train.lr 2e-5 → cosine 5e-5 → 1e-6  (warmer start, decay)
#   * train.batch_size 16 → 64       (1× RTX PRO 6000 96 GB has headroom)
#   * data.h5_path → uses v2 H5 with augmentations applied
#
# Expected time on 1× RTX PRO 6000 ($0.98/h): ~2 hours = ~$2.

seed: 42
device: cuda

data:
  h5_path: /workspace/data/vot_fmo_v2.h5    # rebuilt with the augmentation pipeline
  val_fraction: 0.04
  num_workers: 8
  pin_memory: true

model:
  in_channels: 6
  base_channels: [16, 64, 128, 256, 256]
  use_cbam: true
  predict_matting: true
  predict_uncertainty: true

loss:
  matting_weight: 0.2          # ↓ from 0.5 — let TDF head dominate
  boundary_weight: 0.3         # ↑ from 0.1 — sharper trajectory edges

train:
  epochs: 120
  batch_size: 64
  grad_accum_steps: 1
  lr: 5.0e-5                   # warmer than paper (2e-5) — the cosine schedule decays
  weight_decay: 1.0e-5
  amp: false
  channels_last: true
  grad_clip_norm: 1.0
  log_every_n_steps: 50
  val_every_n_epochs: 1
  save_every_n_epochs: 5
  early_stop_patience: 20      # more patience for the longer run

logging:
  mlflow_uri: file:/workspace/experiments/mlruns
  mlflow_experiment: fmodetect-v2-rerun
  use_clearml: false
  clearml_project: fmodetect-v2
  tensorboard_dir: /workspace/experiments/tb

checkpoints:
  dir: /workspace/experiments/checkpoints
  keep_best_n: 5
