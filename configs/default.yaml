# FMODetect-v2 default training config.
# Tuned for a single 4 GB GPU (GTX 1650, Turing).
seed: 42
device: cuda

data:
  h5_path: datasets/synth/vot_fmo.h5
  val_fraction: 0.04          # paper used 0.04 (4800/200 for 5k)
  num_workers: 2
  pin_memory: true

model:
  in_channels: 6
  base_channels: [16, 64, 128, 256, 256]
  use_cbam: true
  predict_matting: true
  predict_uncertainty: true

loss:
  matting_weight: 0.5
  boundary_weight: 0.1

train:
  epochs: 60
  batch_size: 4
  grad_accum_steps: 4        # effective batch 16
  lr: 2.0e-5                  # paper's lr
  weight_decay: 1.0e-5
  amp: false                  # GTX 1650 (Turing CC 7.5) has no bf16; fp16 NaNs from
                              # large activations in CBAM/no-norm conv blocks.
                              # fp32 fits comfortably (~1.7 GB peak at bs=4).
  channels_last: true
  grad_clip_norm: 1.0
  log_every_n_steps: 20
  val_every_n_epochs: 1
  save_every_n_epochs: 5
  early_stop_patience: 12

logging:
  mlflow_uri: file:./experiments/mlruns
  mlflow_experiment: fmodetect-v2
  use_clearml: false           # toggle when clearml-server is configured
  clearml_project: fmodetect-v2
  tensorboard_dir: experiments/tb

checkpoints:
  dir: experiments/checkpoints
  keep_best_n: 3
